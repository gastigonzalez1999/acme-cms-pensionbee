services:
  - type: web
    name: acme-cms-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        # Set this to your Vercel web app URL in the Render dashboard after deploying.
        sync: false
    autoDeploy: true
