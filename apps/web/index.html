<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acme Co. — Content Hub</title>
    <meta name="description" content="Acme Co. marketing content hub — browse all pages." />
    <!-- Open Graph -->
    <meta property="og:title" content="Acme Co. — Content Hub" />
    <meta property="og:description" content="Acme Co. marketing content hub — browse all pages." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://acme-cms-pensionbee-web-beta.vercel.app/" />
    <meta property="og:image" content="https://acme-cms-pensionbee-web-beta.vercel.app/og-image.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://acme-cms-pensionbee-web-beta.vercel.app/og-image.png" />
    <!-- Dark mode: apply class before paint to avoid flash -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
